# Supabase local development configuration.
# ⚠️  This file ONLY affects the local Supabase emulator (supabase start).
#     It has NO effect on the remote Supabase project at supabase.co.
#     Remote settings (email confirmations, redirect URLs, SMTP) must be
#     configured in the Supabase Dashboard:
#     https://supabase.com/dashboard/project/cxsqlgvbwtevkkljzolg
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "mq-navigation"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
enable_anonymous_sign_ins = true
# site_url must be a web URL for the local emulator.
# The app itself uses the custom scheme io.mqnavigation:// for native deep links.
site_url = "http://localhost:3000"
additional_redirect_urls = [
  # Native deep link — registered in AndroidManifest.xml and iOS Info.plist.
  # ⚠️  Must ALSO be added in the remote Supabase Dashboard under:
  #     Authentication → URL Configuration → Redirect URLs
  "io.mqnavigation://callback",
  # Production web callback (if web build is ever deployed).
  "https://mqnavigation.io/auth/callback",
  # Local Flutter web — Flutter dev server uses a random port.
  "http://localhost",
  "http://localhost:*/auth/callback",
]

[auth.email]
# Enable email confirmations for the local emulator so signup→email→deep-link
# can be tested end-to-end with `supabase start`.
# ⚠️  For the REMOTE project, enable this in the Supabase Dashboard:
#     Authentication → Settings → "Enable email confirmations" → ON
enable_confirmations = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"


[functions.maps-routes]
verify_jwt = false

[functions.notify]
verify_jwt = true

[functions.cleanup-cron]
verify_jwt = true
