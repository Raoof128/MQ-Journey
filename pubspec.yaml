name: mq_journey
description: MQ Journey — Macquarie University campus navigation mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  supabase_flutter: ^2.15.1
  firebase_core: ^4.2.0
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.2
  timezone: ^0.11.0

  # Maps & Location
  flutter_map: ^8.3.0
  flutter_map_tile_caching: ^10.1.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Security
  flutter_secure_storage: ^10.0.0

  # Notifications
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0

  # UI
  cupertino_icons: ^1.0.8
  confetti: ^0.8.0

  # Utilities
  app_links: ^7.0.0
  connectivity_plus: ^7.0.0
  http: ^1.4.0
  logger: ^2.5.0
  icalendar_parser: ^2.1.0
  share_plus: ^12.0.2
  shared_preferences: ^2.5.0
  url_launcher: ^6.3.1
  flutter_compass: ^0.8.1
  torch_light: ^1.1.0
  mobile_scanner: ^7.2.0
  flutter_inappwebview: ^6.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/data/
    - assets/data/indoor/
    - assets/maps/
    - assets/images/
    - assets/photos/
    - assets/stamps/
    - assets/web/
    - assets/web/pannellum/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"
