<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MQ Journey">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MQ Journey</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Workaround for Flutter web assertion failure:
      "!identical(kind, PointerDeviceKind.trackpad) is not true"

    Chrome on macOS sometimes dispatches `pointerdown` events with an empty
    pointerType when the user scrolls or pans with a trackpad. Flutter's web
    engine maps an empty-string pointerType to PointerDeviceKind.trackpad, but
    PointerDownEvent (used for click/tap) asserts that it is NEVER a trackpad
    (trackpad pan/zoom must use PointerPanZoomStartEvent instead).

    We intercept and suppress those spurious pointerdown events at the capture
    phase — before they reach Flutter's canvas — to prevent the assertion crash
    while preserving all normal mouse, touch, and trackpad scroll behaviour.
  -->
  <script>
    (function () {
      window.addEventListener('pointerdown', function (e) {
        if (e.pointerType === '' || e.pointerType === 'unknown') {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, { capture: true, passive: false });
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
